<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rankings Esportivos</title>
<style>
  :root{
    --bg:#F4F6F3; --surface:#FFFFFF; --ink:#15201B; --muted:#5E6E64;
    --line:#E1E6E0; --line-strong:#CBD4CC; --accent:#0E7C5A; --accent-soft:#E3F1EA;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --radius:14px; --shadow:0 1px 2px rgba(20,40,30,.04),0 6px 22px rgba(20,40,30,.06);
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;padding:0 16px 64px}
  .wrap{max-width:860px;margin:0 auto}
  header.top{padding:36px 0 22px;border-bottom:1px solid var(--line);margin-bottom:26px}
  .kicker{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700}
  h1{font-size:clamp(26px,5vw,38px);margin:6px 0 6px;letter-spacing:-.02em;font-weight:800}
  .sub{color:var(--muted);font-size:15px;max-width:60ch}
  .grid{display:grid;gap:14px;grid-template-columns:1fr}
  @media(min-width:640px){.grid{grid-template-columns:1fr 1fr}}
  .cardlink{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;text-decoration:none;color:inherit;transition:.16s}
  a.cardlink:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 10px rgba(20,40,30,.06),0 12px 30px rgba(20,40,30,.09)}
  .cardlink.disabled{opacity:.6}
  .ic{width:48px;height:48px;flex:none;border-radius:12px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:24px}
  .ct{flex:1;min-width:0}
  .nm{font-weight:700;font-size:16px;letter-spacing:-.01em}
  .ds{color:var(--muted);font-size:13px;margin-top:2px}
  .go{color:var(--accent);font-size:20px;font-weight:700}
  .badge{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);background:#EEF1EE;border-radius:999px;padding:4px 10px;white-space:nowrap}
  footer{color:var(--muted);font-size:12px;margin-top:28px;line-height:1.6}
  .note{color:var(--muted);font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="kicker">Portal de rankings</div>
    <h1>Rankings Esportivos</h1>
    <p class="sub">Escolha um esporte para ver o ranking e simular confrontos. Os dados são atualizados automaticamente.</p>
  </header>
  <div class="grid" id="grid"></div>
  <footer><p>Atualização automática de hora em hora. Novos esportes serão adicionados aos poucos.</p></footer>
</div>
<script>
function card(s){
  const active = s.status==='ativo' && s.path;
  const ic = `<div class="ic">${s.emoji||'•'}</div>`;
  const ct = `<div class="ct"><div class="nm">${s.name}</div><div class="ds">${s.desc||''}</div></div>`;
  if(active) return `<a class="cardlink" href="${s.path}">${ic}${ct}<div class="go">→</div></a>`;
  return `<div class="cardlink disabled">${ic}${ct}<div class="badge">em breve</div></div>`;
}
async function boot(){
  const g=document.getElementById('grid');
  try{
    const res=await fetch('sports.json',{cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const j=await res.json();
    g.innerHTML=(j.sports||[]).map(card).join('');
  }catch(e){
    g.innerHTML='<p class="note">Não foi possível carregar a lista de esportes (sports.json). Abra esta página pelo endereço do site no GitHub Pages.</p>';
  }
}
boot();
</script>
</body>
</html>
