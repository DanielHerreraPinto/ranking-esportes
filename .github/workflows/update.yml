name: Atualizar ranking FIFA

   on:
     schedule:
       # 09:00 UTC todos os dias = 06:00 em Brasilia. (o GitHub usa o fuso UTC)
       - cron: "0 9 * * *"
     workflow_dispatch:

   permissions:
     contents: write

   jobs:
     update:
       runs-on: ubuntu-latest
       steps:
         - uses: actions/checkout@v4
         - uses: actions/setup-python@v5
           with:
             python-version: "3.12"
         - name: Instalar dependencias
           run: pip install requests beautifulsoup4
         - name: Atualizar data.json
           run: python update_ranking.py
         - name: Salvar alteracoes
           run: |
             git config user.name "github-actions[bot]"
             git config user.email "github-actions[bot]@users.noreply.github.com"
             git add data.json
             git diff --staged --quiet || git commit -m "Atualiza ranking"
             git push
